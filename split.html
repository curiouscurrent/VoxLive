<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Live Search</title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:white; font-family:Arial; }

  .header {
    text-align:center;
    padding:15px;
    background:#1a1a1a;
  }

  .search-bar {
    text-align:center;
    padding:12px;
    background:#111;
    position:relative;
  }

  input {
    width:60%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    outline:none;
  }

  .suggestions {
    width:60%;
    margin:auto;
    background:#222;
    border-radius:8px;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    overflow:hidden;
  }

  .item {
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #333;
    transition:0.2s;
  }

  .item:hover {
    background:#333;
  }

  .video-container {
    height:calc(100vh - 140px);
    display:flex;
  }

  iframe {
    width:100%;
    height:100%;
    border:none;
  }
</style>
</head>

<body>

<div class="header">
  <h1>🎵 Artist Live Search</h1>
</div>

<div class="search-bar">
  <input id="search" placeholder="Search artist..." oninput="search()">
  <div class="suggestions" id="suggestions"></div>
</div>

<div class="video-container">
  <iframe id="video" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<script>
const artists = [
  {
    name: "Sid Sriram - Maguva Maguva Live",
    video: "https://www.youtube.com/embed/pe1lYcbZe54"
  },
  {
    name: "Sid Sriram - Vennilave Live",
    video: "https://www.youtube.com/embed/uuW6x7jHtYg"
  }
];

// 🔎 SMART SEARCH ENGINE
function search() {
  const val = document.getElementById("search").value.toLowerCase().trim();
  const box = document.getElementById("suggestions");
  box.innerHTML = "";

  if (!val) return;

  const results = artists
    .map(a => {
      let score = 0;

      const name = a.name.toLowerCase();

      if (name.includes(val)) score += 2;

      val.split(" ").forEach(word => {
        if (name.includes(word)) score += 1;
      });

      return { ...a, score };
    })
    .filter(a => a.score > 0)
    .sort((a, b) => b.score - a.score);

  results.forEach(a => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = a.name;

    div.onclick = () => {
      playVideo(a);
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
}

// 🎬 PLAY VIDEO
function playVideo(artist) {
  const iframe = document.getElementById("video");
  iframe.src = artist.video + "?autoplay=1&mute=0";

  document.getElementById("search").value = artist.name;
}
</script>

</body>
</html>
